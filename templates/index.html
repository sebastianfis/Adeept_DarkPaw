<!DOCTYPE html>
<html>

  <title>Robot Control Interface</title>
  <meta charset="utf-8">

<body id="iau9">

    <div id="iicukp" class="gjs-grid-column">

      <div id="i6ip5i" class="gjs-grid-row">
        <div id="it5jvt" class="gjs-grid-column">

        </div>
        <div id="i2vhcw" class="gjs-grid-column">

      </div>

      <div id="icqeon" class="gjs-grid-row">
        <div id="i4puzi" class="gjs-grid-column">
          <div id="imc5zx">Raspi CPU load</div>
        </div>
        <div id="iofgli" class="gjs-grid-column">
          <div id="RaspiCPULoad">N/A</div>
        </div>
      </div>

      <div id="i4wwwl" class="gjs-grid-row">
        <div id="i73ift" class="gjs-grid-column">
          <div id="ic6mnk">Raspi RAM usage</div>
        </div>
        <div id="ipfwls" class="gjs-grid-column">
          <div id="RaspiRAMUsage">N/A</div>

        <div id="ixld29" class="gjs-grid-column">
          <h1 id="ikjx6l" class="gjs-heading">Robi mode</h1>
          <select onchange="ChangeMode()" id="mode_select" name="control_mode" class="gjs-button">
            <option value="remote_controlled">Remote Controlled</option>
            <option value="behaviour_model">Behaviour Model</option>
            <option value="dance">Dance</option>
            <option value="patrol">Patrol</option>
            <option value="stabilize">Stabilize</option>
          </select>
        </div>
      </div>

      <!-- Movement + Position side by side -->
      <div id="i7dlci" class="gjs-grid-row2">

        <!-- Movement Control (D-pad) -->
        <div id="i0t1b8" class="gjs-grid-column">
          <h1 id="itt29y" class="gjs-heading">Movement Control</h1>
          <div id="iy0l8f" class="gjs-grid-row">

            <!-- Left col: turn-left, strafe-left, (empty) -->
            <div id="i2e7vz" class="gjs-grid-column">
              <div id="io2pnq" class="gjs-grid-row">
                <div id="i9fckh" class="gjs-grid-column">
                  <button onclick="Btn_Click('turn_left')" type="submit" id="ik9pp3" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M10 16l-6-6 6-6"/><path d="M20 21v-7a4 4 0 0 0-4-4H5"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="im2hxc" class="gjs-grid-row">
                <div id="iwn12h" class="gjs-grid-column">
                  <button onclick="Btn_Click('move_left')" type="submit" id="irkbz1" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M19 12H6M12 5l-7 7 7 7"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="idcxyi" class="gjs-grid-row"></div>
            </div>

            <!-- Centre col: forward, stop, backward -->
            <div id="io7sei" class="gjs-grid-column">
              <div id="iuaa8b" class="gjs-grid-row">
                <div id="iwr6sr" class="gjs-grid-column">
                  <button onclick="Btn_Click('move_forward')" type="submit" id="img7sp" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 19V6M5 12l7-7 7 7"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="iyzvvk" class="gjs-grid-row">
                <div id="il63a7" class="gjs-grid-column">
                  <button onclick="Btn_Click('stop')" type="submit" id="i180c2" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/>
                      <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="isf9af" class="gjs-grid-row">
                <div id="i9sdzw" class="gjs-grid-column">
                  <button onclick="Btn_Click('move_backward')" type="submit" id="in1puv" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 5v13M5 12l7 7 7-7"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Right col: turn-right, strafe-right, (empty) -->
            <div id="i35gss" class="gjs-grid-column">
              <div id="i2m81r" class="gjs-grid-row">
                <div id="i93i8v" class="gjs-grid-column">
                  <button onclick="Btn_Click('turn_right')" type="submit" id="ifl3ao" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M14 16l6-6-6-6"/><path d="M4 21v-7a4 4 0 0 1 4-4h11"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="ie3vni" class="gjs-grid-row">
                <div id="i6tqiw" class="gjs-grid-column">
                  <button onclick="Btn_Click('move_right')" type="submit" id="ix946l" class="gjs-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M5 12h13M12 5l7 7-7 7"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="iack2k" class="gjs-grid-row"></div>
            </div>

          </div><!-- /dpad -->
        </div><!-- /movement -->

        <!-- Position Control
             CSS grid-placement (by ID) achieves:
             Row 1: [High]   [     ]  [Low  ]
             Row 2: [     ]  [Look↑]  [     ]
             Row 3: [LeanL]  [Neut ]  [LeanR]
             Row 4: [     ]  [Look↓]  [     ]
        -->
        <div id="ic36dt" class="gjs-grid-column">
          <h1 id="ik7f5j" class="gjs-heading">Position Control</h1>

          <div id="iqx29d" class="gjs-grid-row">

            <!-- Col 1 -->
            <div id="i4uuua" class="gjs-grid-column">
              <div id="ilqq2t" class="gjs-grid-row">
                <div id="iv5lwk" class="gjs-grid-column">
                  <button onclick="Btn_Click('high')" type="submit" id="iq853e" class="gjs-button">High</button>
                </div>
              </div>
              <div id="i8ujv5" class="gjs-grid-row">
                <div id="in8jxt" class="gjs-grid-column">
                  <button onclick="Btn_Click('lean_left')" type="submit" id="izxbqs" class="gjs-button">Lean L</button>
                </div>
              </div>
              <div id="iqu5yw" class="gjs-grid-row"></div>

                </div>
              </div>
              <div id="iyal75" class="gjs-grid-row">
                <div id="icc3pp" class="gjs-grid-column">
                  <button onclick="Btn_Click('neutral')" type="submit" id="iapjs4" class="gjs-button">Neutral</button>
                </div>

                <div id="ika8pq" class="gjs-grid-column">

        <input
          onchange="Set_velocity()"
          oninput="document.getElementById('velocity_value').textContent='Set velocity: '+this.value+'%'"
          type="range" min="30" max="100" step="10" value="100"
          class="slider" id="velocity_slider"
        />
      </div>

      <!-- PWM calibration -->
      <div id="icmt2g" class="gjs-grid-row">
        <div id="i251k6" class="gjs-grid-column">
          <h1 id="ia4zpj" class="gjs-heading">PWM calibration</h1>
          <div id="ijk1vo" class="gjs-grid-row2">

            <div id="izbt93" class="gjs-grid-column">
              <div id="iejs1c">Channel</div>
              <select type="text" name="pwm_channel" id="ilazbj" class="gjs-button">
                <option value="0">0</option><option value="1">1</option>
                <option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option>
                <option value="6">6</option><option value="7">7</option>
                <option value="8">8</option><option value="9">9</option>
                <option value="10">10</option><option value="11">11</option>

            <div id="it87od" class="gjs-grid-column">
              <div id="is7fwf">&nbsp;</div>
              <button onclick="Set_actuator()" type="submit" id="i7bvsh" class="gjs-button">Apply</button>
            </div>

            <div id="ie5xhi" class="gjs-grid-column">
              <div id="inaefx">&nbsp;</div>
              <button onclick="Btn_Click('reset_all_actuators')" type="submit" id="i6x2do" class="gjs-button">Reset</button>
            </div>

        </div>

</html>
